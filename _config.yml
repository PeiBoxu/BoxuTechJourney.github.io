# Site settings
title: 博叙TechJourney
SEOTitle: 博叙TechJourney | AI研究生的技术博客
header-img: img/home-bg.jpg
email: boxupei@foxmail.com
description: "记录一名 AI 方向研究生在 LLM、Agent 与强化学习中的学习、实验与思考。"
keyword: "AI, LLM, Agent, Reinforcement Learning, 研究生, 学习笔记, 论文解读, 项目复盘, 技术博客"
url: "https://BoxuTechJourney.github.io"
baseurl: ""

# Author
author: Boxu

# Publish posts or collection documents with a future date.
future: true

# SNS settings
RSS: false
# weibo_username:
# zhihu_username:
github_username: BoxuTechJourney
# twitter_username:
# facebook_username:
# linkedin_username:

# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
highlighter: rouge
permalink: pretty
paginate: 10
exclude:
  [
    "less",
    "node_modules",
    "Gruntfile.js",
    "package.json",
    "README.md",
    "README.zh.md",
  ]
anchorjs: true # if you want to customize anchor. check out line:181 of `post.html`
# If you have timezone issue (e.g. #68) in China, uncomment to use this:
timezone: Asia/Shanghai

# Gems
# from PR#40, to support local preview for Jekyll 3.0
# make sure you have this gem installed
# `$ gem install jekyll-paginate`
plugins: [jekyll-paginate]

# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
kramdown:
  input: GFM # use Github Flavored Markdown !important
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Disqus settings
disqus_username: # 如需评论功能，请填写你的 Disqus shortname

# Netease settings
netease_comment: false

# Analytics settings
# Baidu Analytics
# ba_track_id: [your track id]

# Google Analytics
ga_track_id: "G-9979TQZL47"
ga_domain: BoxuTechJourney.github.io

# Sidebar settings
sidebar: true
sidebar-about-description: "AI 方向研究生<br>探索 LLM / Agent / Reinforcement Learning"
sidebar-avatar: https://github.com/BoxuTechJourney.png

# Featured Tags
featured-tags: true # whether or not using Feature-Tags
featured-condition-size: 1 # A tag will be featured if the size of it is more than this condition value

# Progressive Web Apps
chrome-tab-theme-color: "#000000"
service-worker: true

# MathJax rendering for layout:page (e.g. post preview)
page-mathjax: false

# Friends
friends:
  [

  ]
